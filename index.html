<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewBook</title>
    <link rel="icon" type="image/png" sizes="16x16" href="icon16.png" />
    <style>
      /* Inline minimal theme defaults so the skeleton paints in-theme
         before the bundled CSS loads. Mirrors style.css :root block. */
      :root {
        --t-bg: #0f0e0d;
        --t-card: #181715;
        --t-input: #1a1a1a;
        --t-border-subtle: #1e1e1e;
        --t-text: #e0e0e0;
      }
      body {
        margin: 0;
        background: var(--t-bg);
        color: var(--t-text);
        font-family: "JetBrains Mono", "Cascadia Code", "SF Mono", "Fira Code", monospace;
      }
      .skeleton-shell {
        max-width: 960px;
        margin: 0 auto;
        padding: 80px 40px 40px;
      }
      .skeleton-search {
        height: 48px;
        background: var(--t-input);
        border: 1px solid var(--t-border-subtle);
        border-radius: 8px;
        margin-bottom: 40px;
        animation: breathe 1.5s ease-in-out infinite;
      }
      .skeleton-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 8px;
      }
      .skeleton-card {
        height: 52px;
        background: var(--t-card);
        border: 1px solid var(--t-border-subtle);
        border-radius: 8px;
        animation: breathe 1.5s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
    </style>
    <!-- Pre-flash: set data-theme from storage before Vue mounts -->
    <script>
      (function() {
        if (typeof chrome !== 'undefined' && chrome.storage) {
          chrome.storage.sync.get('theme', function(result) {
            if (result.theme) {
              document.documentElement.dataset.theme = result.theme;
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <div class="skeleton-shell">
        <div class="skeleton-search"></div>
        <div class="skeleton-grid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
