name: Release

on:
  release:
    types: [published]

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Package extension
        run: |
          cd dist
          zip -r ../newbook.zip .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: newbook.zip
